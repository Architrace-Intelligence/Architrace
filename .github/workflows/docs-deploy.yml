name: Documentation Deploy

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: documentation/architrace-inteligence/package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
          token: ${{ secrets.PAGES_DEPLOY_TOKEN || github.token }}

      - name: Install dependencies
        working-directory: documentation/architrace-inteligence
        run: npm ci

      - name: Build site
        working-directory: documentation/architrace-inteligence
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: documentation/architrace-inteligence/dist

  deploy:
    name: Deploy Docs
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
