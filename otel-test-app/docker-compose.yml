services:
  control-plane:
    build:
      context: ..
      dockerfile: otel-test-app/Dockerfile.control-plane
    container_name: control-plane
    ports:
      - "8085:8085"
      - "9090:9090"

  agent:
    build:
      context: ..
      dockerfile: otel-test-app/Dockerfile.agent
    container_name: agent
    ports:
      - "4319:4319"
    depends_on:
      - control-plane

  otel-collector:
    image: otel/opentelemetry-collector:latest
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - agent

  service-a:
    build: .
    container_name: service-a
    command: python app.py
    ports:
      - "8080:8080"
    depends_on:
      - otel-collector

  service-b:
    build: .
    container_name: service-b
    command: python service_b.py
    ports:
      - "8081:8081"
    depends_on:
      - otel-collector

  service-c:
    build: .
    container_name: service-c
    command: python service_c.py
    ports:
      - "8082:8082"
    depends_on:
      - otel-collector
